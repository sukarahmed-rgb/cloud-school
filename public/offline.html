<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud School — غير متصل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080c1a; color: #fbbf24; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100dvh; text-align: center; padding: 1rem; }
        .card { background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.02)); border: 2px solid rgba(245,158,11,0.25); border-radius: 1.5rem; padding: 3rem 2rem; max-width: 400px; backdrop-filter: blur(12px); }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; color: rgba(255,255,255,0.7); margin-bottom: 1rem; line-height: 1.6; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        .btn { display: inline-block; padding: 0.75rem 2rem; background: #f59e0b; color: #000; font-weight: 700; border-radius: 0.75rem; text-decoration: none; margin-top: 0.5rem; }
        .btn:hover { background: #fbbf24; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>غير متصل</h1>
        <p>المنصة تحتاج اتصال بالإنترنت. من فضلك تحقق من اتصالك ثم حاول مرة أخرى.</p>
        <a class="btn" href="javascript:location.reload()">إعادة المحاولة</a>
    </div>
</body>
</html>
