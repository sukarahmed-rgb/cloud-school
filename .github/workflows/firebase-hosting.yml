name: Deploy to Firebase Hosting + Cloudflare Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  preview:
    if: github.event_name == 'pull_request'
    needs: test_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLOUD_SCHOOL_6251A }}
      - name: Deploy to Firebase Hosting Preview
        run: |
          npx firebase-tools hosting:channel:deploy preview-${{ github.event.pull_request.number }} --project cloud-school-6251a

  deploy-cloudflare:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Cloudflare Worker & Apply D1 Migrations
        continue-on-error: true
        run: |
          npx wrangler d1 migrations apply cloud-school-db --remote
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLOUD_SCHOOL_6251A }}
      - name: Deploy to Firebase Hosting Live
        run: |
          npx firebase-tools deploy --only hosting --project cloud-school-6251a
