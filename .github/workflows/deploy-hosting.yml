name: Deploy to Firebase Hosting
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g firebase-tools
      - run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
      - run: python3 -c "import json; f=open('/tmp/gcp-key.json'); d=json.load(f); print('OK: project =', d['project_id'], 'client_email =', d['client_email']); f.close()"
      - run: ls firebase.json && cat firebase.json | head -3
      - run: firebase deploy --only hosting --project cloud-school-6251a --debug 2>&1 | head -50
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
