    <polygon points="-55,5 0,-30 55,5" fill="#f59e0b"/>
    <rect x="-7" y="35" width="14" height="30" rx="6" fill="#f59e0b"/>
    <rect x="-36" y="12" width="18" height="18" rx="2" fill="#6366f1" opacity="0.9"/>
    <rect x="18" y="12" width="18" height="18" rx="2" fill="#6366f1" opacity="0.9"/>
  </g>
  <text x="200" y="340" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="36" font-weight="900" text-anchor="middle" fill="url(#g-gold)">Cloud School</text>
